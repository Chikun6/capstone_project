<aside class="right-sidebar">
  <!-- Search -->
  <div class="rs-search mb-3">
    <span class="rs-search-icon">🔍</span>
    <input type="text" class="rs-search-input" placeholder="Search people..."
      [(ngModel)]="peopleSearch" (input)="filterPeople()" />
  </div>

  <!-- Suggested Profiles — only people you don't follow yet -->
  <div class="rs-card mb-3">
    <div class="rs-card-title">👤 Suggested for you</div>

    <div *ngIf="loading" class="text-center py-3">
      <div class="spinner-border spinner-border-sm text-secondary" style="width:18px;height:18px;"></div>
    </div>

    <ng-container *ngIf="!loading">
      <div class="rs-person" *ngFor="let p of filteredPeople">
        <img [src]="p.profile_picture_url || ('https://i.pravatar.cc/36?u=' + p.username)"
          class="rs-avatar" [alt]="p.first_name">
        <div class="rs-person-info">
          <div class="rs-person-name">{{ p.first_name }} {{ p.last_name }}</div>
          <div class="rs-person-handle">@{{ p.username }}</div>
        </div>
        <button class="rs-follow-btn"
          [disabled]="p.followLoading"
          (click)="followUser(p)">
          <span *ngIf="p.followLoading" class="spinner-border" style="width:10px;height:10px;border-width:1.5px;"></span>
          <span *ngIf="!p.followLoading">Follow</span>
        </button>
      </div>
      <div *ngIf="filteredPeople.length === 0" class="text-muted small text-center py-2">
        {{ peopleSearch ? 'No results' : 'No suggestions right now' }}
      </div>
    </ng-container>
  </div>

  <!-- Trending -->
  <div class="rs-card">
    <div class="rs-card-title">📈 Trending</div>
    <div class="rs-trend" *ngFor="let item of trendingItems; let i = index">
      <span class="rs-trend-rank">{{ i + 1 }}</span>
      <span class="rs-trend-text">{{ item }}</span>
    </div>
  </div>

  <div class="rs-footer mt-3">
    <a href="#" class="rs-footer-link">Feedback</a>
    <a href="#" class="rs-footer-link">Privacy</a>
    <a href="#" class="rs-footer-link">Terms</a>
    <a href="#" class="rs-footer-link">Help</a>
  </div>
</aside>

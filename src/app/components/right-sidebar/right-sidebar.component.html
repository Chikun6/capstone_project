<aside class="right-sidebar">
  <!-- Search People -->
  <div class="search-wrap mb-4">
    <span>🔍</span>
    <input type="text" placeholder="Search people..." [(ngModel)]="peopleSearch" (input)="filterPeople()" />
  </div>

  <!-- Suggested Profiles -->
  <div class="card border-0 rounded-4 mb-3" style="background:#f7f9fc;">
    <div class="card-body p-3">
      <div class="fw-bold small mb-3">👤 Suggested for you</div>
      <div class="suggested-profile" *ngFor="let p of filteredPeople">
        <img [src]="'https://i.pravatar.cc/36?u=' + p.handle" class="rounded-circle flex-shrink-0" width="36" height="36" [alt]="p.name">
        <div class="flex-grow-1 min-w-0">
          <div class="fw-semibold small text-dark text-truncate">{{ p.name }}</div>
          <div class="text-muted" style="font-size:0.78rem;">@{{ p.handle }}</div>
        </div>
        <button class="btn btn-sm rounded-pill fw-semibold"
          [class.btn-dark]="!p.following"
          [class.btn-outline-secondary]="p.following"
          style="font-size:0.78rem;padding:3px 12px;white-space:nowrap;"
          (click)="p.following = !p.following">
          {{ p.following ? 'Following' : 'Follow' }}
        </button>
      </div>
      <div *ngIf="filteredPeople.length === 0" class="text-muted small text-center py-2">No results</div>
    </div>
  </div>

  <!-- Trending -->
  <div class="card border-0 rounded-4" style="background:#f7f9fc;">
    <div class="card-body p-3">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <span class="fw-bold small">📈 Trending</span>
        <span class="text-muted small">···</span>
      </div>
      <div class="trending-item py-2 border-bottom"
        *ngFor="let item of trendingItems; let i = index">
        <span class="text-muted small me-2">{{ i + 1 }}.</span>
        <span class="text-dark fw-medium small">{{ item }}</span>
      </div>
    </div>
  </div>

  <div class="mt-3" style="font-size:0.75rem;">
    <a href="#" class="text-muted me-2">Feedback</a>
    <a href="#" class="text-muted me-2">Privacy</a>
    <a href="#" class="text-muted me-2">Terms</a>
    <a href="#" class="text-muted">Help</a>
  </div>
</aside>
